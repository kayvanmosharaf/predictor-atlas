<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="30" fill="#0f172a" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Globe lines - horizontal -->
  <ellipse cx="32" cy="32" rx="22" ry="8" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="22" ry="16" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Globe lines - vertical -->
  <ellipse cx="32" cy="32" rx="8" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.5"/>
  <ellipse cx="32" cy="32" rx="16" ry="22" fill="none" stroke="#ffffff" stroke-width="1.5" opacity="0.4"/>
  <!-- Crosshair -->
  <line x1="32" y1="6" x2="32" y2="20" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="32" y1="44" x2="32" y2="58" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="6" y1="32" x2="20" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <line x1="44" y1="32" x2="58" y2="32" stroke="#ffffff" stroke-width="2" stroke-linecap="round"/>
  <!-- Center dot -->
  <circle cx="32" cy="32" r="3.5" fill="#ffffff"/>
  <circle cx="32" cy="32" r="1.5" fill="#0f172a"/>
</svg>
